<div class="d-flex justify-content-center mt-5">
    <div class="w-100 px-3" style="max-width: 600px;">
        <h2 class="mb-4 text-center">
            {{ isEditMode ? 'Redigera bok' : 'Lägg till bok' }}
        </h2>
        <form #f="ngForm" (ngSubmit)="save(f)">

            <!-- titel och författare bredvid varandra -->
            <div class="row mb-3">
                <div class="col-12 col-md-6 mb-3 mb-md-0">
                    <div class="form-floating">
                        <input [(ngModel)]="title" name="title" type="text" class="form-control"
                            [class.is-invalid]="f.submitted && !title" id="title" placeholder="Titel" required>
                        <label for="title">Titel *</label>
                        <div class="invalid-feedback">Titel är obligatorisk</div>
                    </div>
                </div>
                <div class="col-12 col-md-6">
                    <div class="form-floating">
                        <input [(ngModel)]="author" name="author" type="text" class="form-control"
                            [class.is-invalid]="f.submitted && !author" id="author" placeholder="Författare" required>
                        <label for="author">Författare *</label>
                        <div class="invalid-feedback">Författare är obligatorisk</div>
                    </div>
                </div>
            </div>

            <!-- publiceringsdatum och genre bredvid varandra -->
            <div class="row mb-3">
                <div class="col-12 col-md-6 mb-3 mb-md-0">
                    <div class="form-floating">
                        <input [(ngModel)]="publishedDate" name="publishedDate" type="date" class="form-control"
                            [class.is-invalid]="f.submitted && !publishedDate" id="publishedDate"
                            placeholder="Publiceringsdatum" required>
                        <label for="publishedDate">Publiceringsdatum *</label>
                        <div class="invalid-feedback">Publiceringsdatum är obligatoriskt</div>
                    </div>
                </div>
                <div class="col-12 col-md-6">
                    <div class="form-floating">
                        <input [(ngModel)]="genre" name="genre" type="text" class="form-control" id="genre"
                            placeholder="Genre">
                        <label for="genre">Genre</label>
                    </div>
                </div>
            </div>

            <!-- beskrivning -->
            <div class="form-floating mb-3">
                <textarea [(ngModel)]="description" name="description" class="form-control" id="description"
                    placeholder="Beskrivning" style="height: 100px"></textarea>
                <label for="description">Beskrivning</label>
            </div>

            <!-- knappar -->
            <div class="d-flex justify-content-between mt-3">
                <button type="submit" class="btn btn-primary">
                    <i class="fa-solid fa-floppy-disk"></i> Spara
                </button>
                <button type="button" class="btn btn-secondary" routerLink="/books">
                    <i class="fa-solid fa-arrow-left"></i> Avbryt
                </button>
            </div>

        </form>
    </div>
</div>
