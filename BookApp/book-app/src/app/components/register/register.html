<div class="d-flex justify-content-center mt-5">
    <div class="w-100 px-3" style="max-width: 400px;">
        <h2 class="mb-4 text-center">Skapa konto</h2>
        <form>
            <div class="form-floating mb-3">
                <input [(ngModel)]="username" name="username" type="text" class="form-control" id="username"
                    placeholder="Användarnamn">
                <label for="username">Användarnamn</label>
            </div>
            <div class="form-floating mb-3">
                <input [(ngModel)]="password" name="password" type="password" class="form-control" id="password"
                    placeholder="Lösenord">
                <label for="password">Lösenord</label>
            </div>

            <!-- felmeddelande -->
            @if (errorMessage) {
            <div class="alert alert-danger">{{ errorMessage }}</div>
            }

            <div class="d-flex justify-content-between mt-3">
                <button type="submit" class="btn btn-primary" (click)="register()">
                    <i class="fa-solid fa-user-plus"></i> Skapa konto
                </button>
                <button type="button" class="btn btn-secondary" routerLink="/login">
                    <i class="fa-solid fa-arrow-left"></i> Gå tillbaka
                </button>
            </div>
        </form>
    </div>
</div>
