<div class="d-flex justify-content-center mt-5">
    <div class="w-100 px-3" style="max-width: 600px;">
        <h2 class="mb-4 text-center">
            {{ isEditMode ? 'Redigera citat' : 'Lägg till citat' }}
        </h2>
        <form #f="ngForm" (ngSubmit)="save(f)">

            <!-- citat -->
            <div class="form-floating mb-3">
                <textarea [(ngModel)]="text" name="text" class="form-control" [class.is-invalid]="f.submitted && !text"
                    id="text" placeholder="Citat" style="height: 100px" required></textarea>
                <label for="text">Citat *</label>
                <div class="invalid-feedback">Citat är obligatoriskt</div>
            </div>

            <!-- författare -->
            <div class="form-floating mb-3">
                <input [(ngModel)]="author" name="author" type="text" class="form-control"
                    [class.is-invalid]="f.submitted && !author" id="author" placeholder="Författare" required>
                <label for="author">Författare *</label>
                <div class="invalid-feedback">Författare är obligatorisk</div>
            </div>

            <!-- knappar -->
            <div class="d-flex justify-content-between mt-3">
                <button type="submit" class="btn btn-primary">
                    <i class="fa-solid fa-floppy-disk"></i> Spara
                </button>
                <button type="button" class="btn btn-secondary" routerLink="/quotes">
                    <i class="fa-solid fa-arrow-left"></i> Avbryt
                </button>
            </div>

        </form>
    </div>
</div>
